<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .pricing-table {
            display: flex;
            justify-content: space-around;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
        }
        .plan {
            flex: 1;
            padding: 20px;
            text-align: center;
        }
        .plan:not(:last-child) {
            border-right: 1px solid #eeeeee;
        }
        .plan-title {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .plan-price {
            font-size: 2em;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        .plan-features {
            list-style: none;
            padding: 0;
            text-align: left;
        }
        .plan-features li {
            margin-bottom: 10px;
        }
        .plan-signup {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .plan-signup:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
<div class="pricing-table">
    <div class="plan">
        <div class="plan-title">Basic</div>
        <div class="plan-price">$9.99/mo</div>
        <ul class="plan-features">
            <li>10 Projects</li>
            <li>5 GB Storage</li>
            <li>Email Support</li>
        </ul>
        <button class="plan-signup">Sign Up</button>
    </div>
    <div class="plan">
        <div class="plan-title">Pro</div>
        <div class="plan-price">$19.99/mo</div>
        <ul class="plan-features">
            <li>50 Projects</li>
            <li>20 GB Storage</li>
            <li>Priority Email Support</li>
        </ul>
        <button class="plan-signup">Sign Up</button>
    </div>
    <div class="plan">
        <div class="plan-title">Enterprise</div>
        <div class="plan-price">$29.99/mo</div>
        <ul class="plan-features">
            <li>Unlimited Projects</li>
            <li>100 GB Storage</li>
            <li>Phone & Email Support</li>
        </ul>
        <button class="plan-signup">Sign Up</button>
    </div>
</div>
</body>
</html>
